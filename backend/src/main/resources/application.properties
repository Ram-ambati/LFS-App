spring.application.name=backend

# PostgreSQL - reads from environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Admin@123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Optional: only enable when debugging database issues
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT - reads from environment variables
jwt.secret=${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-use}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:2592000000}

# File Upload
file.upload-dir=${FILE_UPLOAD_DIR:uploads/}
file.max-size=104857600

# Multipart Limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Application Environment
app.environment=${APP_ENVIRONMENT:development}

# Frontend URL (for CORS configuration)
frontend.url=${FRONTEND_URL:http://localhost:5173}