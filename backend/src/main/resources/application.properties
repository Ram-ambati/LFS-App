spring.application.name=backend
server.port=${PORT:8080}

# PostgreSQL - Supabase as default fallback
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lfs_app}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
# Optional debugging
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# JWT
jwt.secret=${JWT_SECRET:LFS_APP_DEV_SECRET_CHANGE_BEFORE_PRODUCTION}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:2592000000}
# File Upload
file.upload-dir=${FILE_UPLOAD_DIR:uploads/}
file.max-size=104857600
# Multipart Limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
# Environment
app.environment=${APP_ENVIRONMENT:development}
# Frontend URL (CORS)
frontend.url=${FRONTEND_URL:[http://localhost:5173}](http://localhost:5173})
# Cloudinary (future migration)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.upload-folder=${CLOUDINARY_UPLOAD_FOLDER:lfs-app/uploads}
